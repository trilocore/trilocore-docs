site_name: Trilocore Docs
site_url: https://doc.trilocore.com/
site_description: How to use BEVM (security workbench) and Janus (AI analyst) — Trilocore smart-contract security.
copyright: © 2026 Trilocore

theme:
  name: material
  language: en
  favicon: favicon.svg
  logo: favicon.svg
  palette:
    scheme: slate
    primary: black
    accent: light blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://trilocore.com/
    - icon: fontawesome/solid/flask
      link: https://bevm.trilocore.ai/
  generator: false

nav:
  - Home: index.md
  - BEVM (workbench): bevm.md
  - Janus (AI analyst): janus.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search

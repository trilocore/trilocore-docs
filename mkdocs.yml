site_name: Trilocore Docs
site_url: https://docs.trilocore.ai/
site_description: How to use BEVM (security workbench) and Janus (AI analyst) — Trilocore smart-contract security.
copyright: © 2026 Trilocore

theme:
  name: material
  language: en
  favicon: favicon.svg
  logo: favicon.svg
  palette:
    scheme: slate
    primary: black
    accent: light blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://trilocore.com/
    - icon: fontawesome/solid/flask
      link: https://bevm.trilocore.ai/
  generator: false

# Navigation is driven from the filesystem by the awesome-pages plugin: the top-level
# order lives in docs/.pages, and docs/audits/.pages governs the audit-report ordering
# (newest first). This means Janus can drop a new report into docs/audits/ without
# anyone editing mkdocs.yml.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search
  # awesome-pages auto-includes new files under docs/audits/ (sorted newest-first via
  # docs/audits/.pages) — so Janus dropping a new report into that folder is enough; we
  # do NOT need to edit mkdocs.yml on every audit.
  - awesome-pages
